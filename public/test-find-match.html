<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Find Match API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Test Find Match API</h1>

    <div>
        <h3>Test 1: Simple Find Match Request</h3>
        <input type="file" id="test-image" accept="image/*">
        <button class="test-button" onclick="testFindMatch()">Test Find Match</button>
        <div id="result1" class="result" style="display: none;"></div>
    </div>

    <div>
        <h3>Test 2: Find Match with Text Search</h3>
        <input type="file" id="test-image2" accept="image/*">
        <input type="text" id="search-text" placeholder="Search text" value="rose">
        <button class="test-button" onclick="testFindMatchWithText()">Test with Text</button>
        <div id="result2" class="result" style="display: none;"></div>
    </div>

    <script>
        async function testFindMatch() {
            const resultDiv = document.getElementById('result1');
            const imageInput = document.getElementById('test-image');

            if (!imageInput.files[0]) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = 'Please select an image first';
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.className = 'result info';
            resultDiv.innerHTML = 'Testing find match...';

            try {
                const formData = new FormData();
                formData.append('images[]', imageInput.files[0]);
                formData.append('threshold', '0.7');

                const response = await fetch('/api/v1/compare/find-match', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h4>✅ Success!</h4>
                        <p>Status: ${response.status}</p>
                        <p>Matches found: ${data.data.total_matches}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h4>❌ Error!</h4>
                        <p>Status: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<h4>❌ Network Error:</h4><p>${error.message}</p>`;
            }
        }

        async function testFindMatchWithText() {
            const resultDiv = document.getElementById('result2');
            const imageInput = document.getElementById('test-image2');
            const searchText = document.getElementById('search-text').value;

            if (!imageInput.files[0]) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = 'Please select an image first';
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.className = 'result info';
            resultDiv.innerHTML = 'Testing find match with text...';

            try {
                const formData = new FormData();
                formData.append('images[]', imageInput.files[0]);
                formData.append('threshold', '0.7');
                formData.append('search_text', searchText);
                formData.append('text_threshold', '0.5');
                formData.append('text_weight', '0.3');

                const response = await fetch('/api/v1/compare/find-match', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h4>✅ Success!</h4>
                        <p>Status: ${response.status}</p>
                        <p>Matches found: ${data.data.total_matches}</p>
                        <p>Search text: ${data.data.search_text}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h4>❌ Error!</h4>
                        <p>Status: ${response.status}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<h4>❌ Network Error:</h4><p>${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
