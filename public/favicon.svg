<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  <!-- Search icon with "F" -->
  <g transform="translate(50, 50)">
    <!-- Search circle -->
    <circle cx="-15" cy="-5" r="18" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Search handle -->
    <line x1="5" y1="15" x2="18" y2="28" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- "F" letter inside -->
    <text x="-15" y="0" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">F</text>
  </g>
</svg>
