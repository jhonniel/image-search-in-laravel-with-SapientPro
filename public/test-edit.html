<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Edit Functionality</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Test Edit Functionality</h1>

    <div>
        <h3>Test 1: Check if images have metadata IDs</h3>
        <button class="test-button" onclick="checkImages()">Check Images</button>
        <div id="result1" class="result" style="display: none;"></div>
    </div>

    <div>
        <h3>Test 2: Test Edit Button Click</h3>
        <button class="test-button" onclick="testEditClick()">Test Edit Click</button>
        <div id="result2" class="result" style="display: none;"></div>
    </div>

    <script>
        async function checkImages() {
            const resultDiv = document.getElementById('result1');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.innerHTML = 'Checking images...';

            try {
                const response = await fetch('/api/v1/reference-images');
                const data = await response.json();

                if (data.success) {
                    let html = '<h4>Image Analysis:</h4><ul>';
                    data.data.images.forEach((image, index) => {
                        const hasMetadata = image.metadata_id !== null && image.metadata_id !== undefined;
                        html += `<li>Image ${index + 1}: ${image.original_name} - Metadata ID: ${image.metadata_id} ${hasMetadata ? '✅' : '❌'}</li>`;
                    });
                    html += '</ul>';

                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = 'Failed to fetch images';
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = 'Error: ' + error.message;
            }
        }

        function testEditClick() {
            const resultDiv = document.getElementById('result2');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.innerHTML = 'Testing edit button click...';

            // Simulate the edit button click with test data
            const testData = {
                metadataId: 1,
                originalName: 'test-image.jpg',
                description: 'Test description',
                tags: 'test, image, sample',
                uploaderEmail: 'test@example.com'
            };

            try {
                // Test the function that would be called
                console.log('Testing edit function with:', testData);

                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <h4>✅ Edit Function Test Passed</h4>
                    <p>Test data processed successfully:</p>
                    <ul>
                        <li>Metadata ID: ${testData.metadataId}</li>
                        <li>Original Name: ${testData.originalName}</li>
                        <li>Description: ${testData.description}</li>
                        <li>Tags: ${testData.tags}</li>
                        <li>Email: ${testData.uploaderEmail}</li>
                    </ul>
                    <p>Check browser console for detailed logs.</p>
                `;
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
